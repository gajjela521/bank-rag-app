spring.application.name=bank-rag-backend

# H2 Configuration (Default for Development)
spring.datasource.url=jdbc:h2:mem:bankdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# DB2 Configuration (Uncomment if DB2 server is available)
# spring.datasource.url=jdbc:db2://localhost:50000/BANKDB
# spring.datasource.username=db2inst1
# spring.datasource.password=password
# spring.datasource.driverClassName=com.ibm.db2.jcc.DB2Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.DB2Dialect
spring.jpa.hibernate.ddl-auto=update

# OpenAI / Spring AI Configuration
spring.ai.openai.api-key=${OPENAI_API_KEY}
# Temperature 0 as requested
spring.ai.openai.chat.options.temperature=0.0

# Vector Store (Assuming generic usage or placeholders, using PGVector as example in POM but can be swapped)
# For demo purposes we often stick to SimpleVectorStore (in-memory) if no pgvector is up, but standard config:
# spring.ai.vectorstore.pgvector.url=jdbc:postgresql://localhost:5432/vectordb
# ...

# Server Port
server.port=${PORT:8080}

# Actuator Endpoints (Enterprise Health/Metrics)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
